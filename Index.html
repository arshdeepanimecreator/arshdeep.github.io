<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arshdeep Singh</title>
    <style>
        body { margin: 0; padding: 0; background: #000; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif; color: white; text-align: center; overflow: hidden; position: relative; }
        .stars-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at center, #1a1a2e 0%, #000 100%); }
        .stars-bg::after { content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background-image: url('https://www.transparenttextures.com/patterns/stardust.png'); animation: rotateBg 100s linear infinite; opacity: 0.4; }
        @keyframes rotateBg { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .logo-circle { width: 110px; height: 110px; border-radius: 50%; background: linear-gradient(135deg, #00ffcc, #00d4ff); display: flex; align-items: center; justify-content: center; font-size: 45px; font-weight: 900; color: #000; margin-bottom: 15px; box-shadow: 0 0 30px rgba(0, 255, 204, 0.6); border: 4px solid #fff; animation: pulse 2s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.05); } }
        .neon-name { font-size: 32px; font-weight: 900; color: #fff; text-shadow: 0 0 10px #00ffcc, 0 0 20px #00ffcc; text-transform: uppercase; margin: 5px 0; }
        .sub-text { color: #00ffcc; font-size: 14px; letter-spacing: 2px; margin-bottom: 30px; font-weight: bold; }
        .btn-container { display: flex; flex-direction: column; gap: 15px; }
        .btn { width: 250px; padding: 14px; border-radius: 50px; border: none; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.3s; font-size: 14px; color: #fff; text-decoration: none; display: inline-block; text-align: center; }
        .btn-yt { background: #ff0000; box-shadow: 0 5px 15px rgba(255, 0, 0, 0.3); }
        .btn-ig { background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); box-shadow: 0 5px 15px rgba(188, 24, 136, 0.3); }
        .btn:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 10px 20px rgba(255,255,255,0.2); }
        a { text-decoration: none; }
    </style>
</head>
<body>
    <div class="stars-bg"></div>
    <div class="logo-circle">AS</div>
    <h1 class="neon-name">Arshdeep Singh</h1>
    <p class="sub-text">Digital Creator | YouTuber</p>
    <div class="btn-container">
        <a href="https://www.youtube.com/@Sinder-tf1vw" target="_blank">
            <div class="btn btn-yt">Subscribe YouTube</div>
        </a>
        <a href="https://www.instagram.com/Itz_arshdeep_singh____" target="_blank">
            <div class="btn btn-ig">Follow Instagram</div>
        </a>
    </div>
</body>
</html>
